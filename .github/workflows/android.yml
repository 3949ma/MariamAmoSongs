name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. تنظيف مساحة القرص لتفادي نفاد الذاكرة
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      # 3. تهيئة إصدار بايثون المطلوب للتجميع
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. تثبيت جافا (مهم جداً لتشغيل أندرويد و Buildozer)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      # 5. تثبيت الاعتمادات وأدوات التجميع الكاملة
      - name: Install Buildozer and Toolchain Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config libltdl-dev zip unzip openjdk-17-jdk lld libgmp3-dev
          pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install buildozer cython virtualenv textwrap3

            # 6. تشغيل البناء مع تقييد استهلاك الذاكرة ومنع قتل العملية
      - name: Build with Buildozer
        run: |
                # 6. الموافقة الجبرية على تراخيص Buildozer وبدء التجميع
      - name: Build with Buildozer
        run: |
          # 1. إنشاء مجلد التراخيص الخاص بـ Buildozer مسبقاً في النظام
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # 2. زرع الهاشات الرقمية الرسمية لتراخيص أندرويد (تخطي شاشة الموافقة تماماً)
          echo -e "\n893a5cd8a1e50711915911b413901a09654d7b96\nd56f5187479451eabf01fb7431302533134d3410\ncc4eae120a44fa60c05fe3a4d4b953555da4c675" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f2910" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          
          # 3. إجبار النظام على استخدام نواة واحدة لحماية الذاكرة العشوائية من الامتلاء
          export MAKEFLAGS="-j1"
          export NUM_CORES=1
          
          # 4. تشغيل التجميع مباشرة
          buildozer android debug



      # 7. تصدير ملف الـ APK النهائي وحفظه للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: bin/*.apk
