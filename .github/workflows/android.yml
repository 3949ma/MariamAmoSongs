name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build with Docker
        run: |
          docker build -t amosongs .
          docker run --rm -v ${{ github.workspace }}:/home/user/app amosongs

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AmoSongs-APK
          path: bin/*.apk
