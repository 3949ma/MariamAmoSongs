name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. تنظيف مساحة القرص لتفادي نفاد الذاكرة
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      # 3. تهيئة إصدار بايثون المطلوب للتجميع
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. تثبيت جافا (مهم جداً لتشغيل أندرويد و Buildozer)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 5. تثبيت الاعتمادات وأدوات التجميع الكاملة
      - name: Install Buildozer and Toolchain Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config libltdl-dev zip unzip openjdk-17-jdk
          pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install buildozer cython virtualenv textwrap3

      # 6. تشغيل البناء مع تقليص حجم السجل (Logs) لتفادي قطع الخطوة من جيت هاب
      - name: Build with Buildozer
        run: |
          # كتم مخرجات python-for-android التفصيلية تماماً
          export P4A_QUIET=1
          export P4A_no_test_compile=1
          
          # تشغيل بيلدوزر بدون خيار الإسهاب وبدون طباعة سطور التجميع المتكررة لملفات بايثون
          yes y | buildozer android debug > buildozer_output.log 2>&1 &
          
          # طباعة نقطة كل 10 ثوانٍ لتعريف جيت هاب أن البناء مستمر دون ملء السجل بالسطور
          PID=$!
          echo "البناء بدأ في الخلفية لمنع تضخم السجل..."
          while kill -0 $PID 2>/dev/null; do
            echo -n "."
            sleep 10
          done
          
          # التحقق من حالة الخروج بعد الانتهاء
          wait $PID
          STATUS=$?
          if [ $STATUS -ne 0 ]; then
            echo "فشل البناء! إليك آخر 100 سطر من السجل لمعرفة السبب الرئيسي:"
            tail -n 100 buildozer_output.log
            exit $STATUS
          fi
          echo "تم البناء بنجاح وبدون تضخيم السجل!"

      # 7. تصدير ملف الـ APK النهائي وحفظه للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: bin/*.apk
