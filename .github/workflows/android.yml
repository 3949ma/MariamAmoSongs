name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. تنظيف مساحة القرص بالكامل لتفادي نفاد الذاكرة في حاوية الخادم
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      # 2. تهيئة إصدار بايثون الخاص بنظام التجميع الرئيسي
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. تثبيت أدوات التجميع الكاملة وحل مشكلة الماكرو والـ Autotools المفقودة
      - name: Install Buildozer and Toolchain Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config libltdl-dev
          pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install buildozer cython virtualenv textwrap3

      # 4. تشغيل بناء التطبيق مع حظر ملفات الاختبار واللغات الإضافية لتوفير الوقت
            # 4. تشغيل بناء التطبيق مع قبول التراخيص وحظر ملفات الاختبار
      - name: Build with Buildozer
        run: |
          # السطر السحري للموافقة التلقائية على كافة تراخيص أندرويد
          yes | /usr/local/lib/android/sdk/tools/bin/sdkmanager --licenses || true
          
          export P4A_no_test_compile=1
          export P4A_QUIET=1
          buildozer -v android debug

      # 5. تصدير ملف الـ APK النهائي وحفظه في الموقع لتتمكن من تحميله مباشرة
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: bin/*.apk
