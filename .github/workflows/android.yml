name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. تنظيف مساحة القرص لتفادي نفاد الذاكرة
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      # 3. تهيئة إصدار بايثون المطلوب للتجميع
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. تثبيت جافا (مهم جداً لتشغيل أندرويد و Buildozer)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 5. تثبيت الاعتمادات وأدوات التجميع الكاملة
      - name: Install Buildozer and Toolchain Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config libltdl-dev zip unzip openjdk-17-jdk wget
          pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install buildozer cython virtualenv textwrap3

      # 6. إعداد الـ SDK يدوياً وتشغيل البناء لتفادي مشكلة sdkmanager الكلاسيكية
      - name: Build with Buildozer
        run: |
          # إنشاء هيكل المجلدات الحديث الذي يتوقعه بيلدوزر وأدوات أندرويد
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          
          # تحميل أدوات السطر البرمجي الرسمية من جوجل (الإصدار المستقر والمناسب للرخص)
          wget https://google.com -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          
          # نقل الملفات المستخرجة إلى المسار المتوافق
          mv cmdline-tools/* ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
          rm -rf cmdline-tools cmdline-tools.zip
          
          # الموافقة المسبقة على الرخص داخل المجلد الذي أنشأناه يدوياً
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=/home/runner/.buildozer/android/platform/android-sdk || true
          
          # عمل اختصار "Symlink" للمسار القديم لخدع بيلدوزر إذا بحث في المجلد القديم tools/bin
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools
          ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin ~/.buildozer/android/platform/android-sdk/tools/bin

          # البدء في تشغيل البناء
          export P4A_no_test_compile=1
          export P4A_QUIET=1
          buildozer -v android debug

      # 7. تصدير ملف الـ APK النهائي وحفظه للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: bin/*.apk
