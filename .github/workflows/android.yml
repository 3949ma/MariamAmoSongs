name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. تنظيف مساحة القرص لتفادي نفاد الذاكرة
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      # 3. تهيئة إصدار بايثون المطلوب للتجميع
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. تثبيت جافا (مهم جداً لتشغيل أندرويد و Buildozer)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      # 5. تثبيت الاعتمادات وأدوات التجميع الكاملة
      - name: Install Buildozer and Toolchain Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config libltdl-dev zip unzip openjdk-17-jdk lld libgmp3-dev
          pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install buildozer cython virtualenv textwrap3

      # 6. تشغيل البناء في الخلفية بشكل صحيح (بدون Broken Pipe)
      - name: Build with Buildozer
        run: |
          export P4A_QUIET=1
          export P4A_no_test_compile=1
          
          # تشغيل البناء وتوجيه المدخلات والمخرجات بشكل آمن
          buildozer android debug < /dev/null > buildozer_output.log 2>&1 &
          PID=$!
          
          echo "البناء بدأ في الخلفية..."
          while kill -0 $PID 2>/dev/null; do
            echo -n "."
            sleep 15
          done
          
          wait $PID
          STATUS=$?
          if [ $STATUS -ne 0 ]; then
            echo -e "\n[خطأ] فشل البناء! إليك السطور الأخيرة من السجل لمعرفة السبب الحقيقي:"
            tail -n 150 buildozer_output.log
            exit $STATUS
          fi
          echo -e "\nتم البناء بنجاح!"

      # 7. تصدير ملف الـ APK النهائي وحفظه للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: bin/*.apk
